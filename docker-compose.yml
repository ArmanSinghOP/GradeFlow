version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./app:/app/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q gradeflow

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradeflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gradeflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
