[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
  "integration: requires Docker and running services",
]
testpaths = ["tests"]
filterwarnings = [
  "ignore::DeprecationWarning:langchain_core",
  "ignore::UserWarning:pydantic",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
